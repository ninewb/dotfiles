# ==============================================================================
# TMUX CONFIGURATION
# ==============================================================================

# --- Reload Config Shortcut ---
# Reload config with Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config Reloaded!"

# --- General Settings & Neovim Responsiveness ---
set -s escape-time 10          # Remove ESC mode-switch lag in Neovim
set -g repeat-time 500         # Lower repeat-key window to 500ms (prevents pane-resize key stealing)
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ',xterm-256color:RGB'

set -g mouse on               # Enable mouse support
set -g focus-events on        # Enable focus events for Neovim auto-read/save
set -g set-clipboard on       # Enable system clipboard
set -g detach-on-destroy off  # Don't exit tmux when closing a session

# Start window and pane numbering from 1 (matches physical keyboard layout)
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Terminal cursor shape support
set-option -g terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'

# Use Vi keybindings in copy mode
setw -g mode-keys vi

# --- Copy Mode & System Clipboard ---
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v xclip >/dev/null 2>&1; then xclip -in -selection clipboard; else cat >/dev/null; fi'

# --- Window & Session Navigation ---
# Session Rename (Prefix + R)
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# Unbind default pane keys (handled automatically by vim-tmux-navigator)
unbind h
unbind j
unbind k
unbind l

# Fast Window Switching with Alt + 0..9
bind -n M-0 select-window -t :0
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Splitting Panes (retains current working directory)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"

# Resizing Panes (Vim keys)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z # Maximize current pane

# --- AI & Git Workflows ---
# Toggle OpenCode TUI popup (Prefix + a)
bind a display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "opencode"

# Resume previous OpenCode session popup (Prefix + A)
bind A display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "opencode --continue"

# Open OpenCode in a 35% side split panel (Prefix + Ctrl + a)
bind C-a split-window -h -l 35% -c "#{pane_current_path}" "opencode"

# Toggle Lazygit floating popup (Prefix + G)
bind G display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# --- Scripting & Custom Utility Popups ---
bind-key f display-popup -E -w 60% -h 60% "~/.config/scripts/tmux-sessionizer.sh"
bind-key F display-popup -E -w 60% -h 60% "~/.config/scripts/tmux-sessionizer.sh new"
bind-key -r H run-shell "~/.config/scripts/tmux-sessionizer.sh ~"
bind-key o display-popup -E -w 60% -h 60% -x C -y C "~/.config/scripts/tmux-open-pdf.sh"
bind-key s display-popup -E -w 80% -h 80% "~/.config/scripts/tmux-session-manager.sh"
bind-key g run-shell "~/.config/scripts/tmux-open-github.sh"

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @resurrect-save-shell-history 'on'

# ==============================================================================
# MINIMAL THEME CONFIGURATION
# ==============================================================================

# Colors
BG_COLOR="#1A1D23"
ACTIVE_COLOR="#b4befe"
INACTIVE_COLOR="#6c7086"
TEXT_COLOR="#cdd6f4"
ACCENT_COLOR="#b4befe"

# Basic status bar setup
set -g status on
set -g status-position bottom
set -g status-interval 5     # Increased to 5s to drastically reduce background CPU overhead
set -g status-justify left

# Status bar colors and style
set -g status-style "bg=$BG_COLOR,fg=$TEXT_COLOR"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=$ACTIVE_COLOR"

# Message style
set -g message-style "bg=$BG_COLOR,fg=$TEXT_COLOR,bold"
set -g message-command-style "bg=$BG_COLOR,fg=$TEXT_COLOR,bold"

# Window status format
set -g window-status-format "#[fg=$INACTIVE_COLOR,bg=$BG_COLOR] #I:#W "
set -g window-status-current-format "#[fg=$ACTIVE_COLOR,bg=$BG_COLOR,bold] #I:#W "
set -g window-status-separator ""

# Status left (session name with prefix & copy mode indicators)
set -g status-left "#[fg=$ACCENT_COLOR,bold]  #S #[fg=$INACTIVE_COLOR]│ #{?client_prefix,#[fg=#f38ba8,bold]#[fg=$INACTIVE_COLOR]│ ,}#{?pane_in_mode,#[fg=#f38ba8,bold]VIS#[fg=$INACTIVE_COLOR]│ ,}"

# Status right (uses native tmux path logic instead of spawning bash subshells)
set -g status-right "\
#[fg=$ACCENT_COLOR] #[fg=$TEXT_COLOR]#{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}} \
#[fg=$INACTIVE_COLOR]│ \
#[fg=$ACCENT_COLOR]⎈ #[fg=$TEXT_COLOR]#(kubectl config current-context 2>/dev/null) \
#[fg=$INACTIVE_COLOR]#(git -C \"#{pane_current_path}\" rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo \"│ \")\
#[fg=$ACCENT_COLOR]#(git -C \"#{pane_current_path}\" rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo \" \")\
#[fg=$TEXT_COLOR]#(git -C \"#{pane_current_path}\" rev-parse --is-inside-work-tree >/dev/null 2>&1 && git -C \"#{pane_current_path}\" rev-parse --abbrev-ref HEAD 2>/dev/null)\
#[fg=$ACTIVE_COLOR]#(git -C \"#{pane_current_path}\" rev-parse --is-inside-work-tree >/dev/null 2>&1 && ! git -C \"#{pane_current_path}\" status --porcelain 2>/dev/null | grep -q . && echo \" ✓\")\
#[fg=#f38ba8]#(git -C \"#{pane_current_path}\" rev-parse --is-inside-work-tree >/dev/null 2>&1 && git -C \"#{pane_current_path}\" status --porcelain 2>/dev/null | grep -q . && echo \" ●\") \
#[fg=$INACTIVE_COLOR]│ \
#[fg=$ACCENT_COLOR] #[fg=$TEXT_COLOR]#(date +%d) \
#[fg=$INACTIVE_COLOR]│ \
#[fg=$ACCENT_COLOR] #[fg=$TEXT_COLOR]#(date +%H:%M) "

# Copy mode & Clock styling
set -g mode-style "bg=$ACTIVE_COLOR,fg=$BG_COLOR"
set -g clock-mode-colour "$ACTIVE_COLOR"
set -g clock-mode-style 24

# --- TPM Initialization (XDG Directory) ---
run '~/.config/tmux/plugins/tpm/tpm'
